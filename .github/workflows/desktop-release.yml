name: DucDrop desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            platform: darwin
            arch: arm64
            bundles: dmg,app
          - name: macOS Intel
            os: macos-13
            platform: darwin
            arch: x64
            bundles: dmg,app
          - name: Linux x64
            os: ubuntu-22.04
            platform: linux
            arch: x64
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare sidecar binaries
        env:
          DUCDROP_TARGET_PLATFORM: ${{ matrix.platform }}
          DUCDROP_TARGET_ARCH: ${{ matrix.arch }}
        run: pnpm prepare:sidecars

      - name: Check
        run: pnpm check

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri bundle
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DucDrop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: error
